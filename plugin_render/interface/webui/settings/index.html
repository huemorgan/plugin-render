<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Render settings</title>
  <style>
    :root {
      --ink-950: #0a0b10; --ink-900: #11131b; --ink-800: #1a1d28;
      --ink-500: #6b7280; --ink-400: #9ca3af; --ink-300: #c3c8d2; --ink-50: #f3f4f6;
      --luna-600: #6d5efc; --luna-500: #8b7bff; --luna-400: #a99bff;
      --green: #34d399; --red: #f87171;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: transparent; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: var(--ink-50); padding: 2rem; max-width: 48rem;
    }
    h1 { font-size: 1.05rem; font-weight: 600; margin: 0 0 .25rem; }
    .sub { color: var(--ink-400); font-size: .85rem; margin: 0 0 1.5rem; line-height: 1.45; }
    .card {
      background: rgba(17,19,27,.4); border: 1px solid rgba(255,255,255,.06);
      border-radius: .75rem; padding: 1.25rem;
    }
    .row { display: flex; align-items: center; gap: .75rem; margin-bottom: 1rem; }
    .dot { width: .55rem; height: .55rem; border-radius: 50%; }
    .dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot.off { background: var(--ink-500); }
    label { display: block; margin-bottom: 1rem; }
    label span { display: block; font-size: .8rem; color: var(--ink-300); margin-bottom: .4rem; }
    input {
      width: 100%; background: rgba(10,11,16,.8); border: 1px solid rgba(255,255,255,.1);
      border-radius: .5rem; padding: .65rem .75rem; color: var(--ink-50); font-size: .9rem;
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    input:focus { border-color: var(--luna-500); box-shadow: 0 0 0 2px rgba(139,123,255,.25); }
    button {
      display: inline-flex; align-items: center; gap: .5rem; cursor: pointer;
      border: none; border-radius: .5rem; font-size: .875rem; font-weight: 500;
      padding: .55rem 1rem; color: #fff; transition: background .15s, opacity .15s;
    }
    button.primary { background: var(--luna-600); }
    button.primary:hover { background: var(--luna-500); }
    button.danger { background: rgba(220,38,38,.8); }
    button.danger:hover { background: rgb(220,38,38); }
    button:disabled { opacity: .5; cursor: default; }
    a { color: var(--luna-400); }
    .err {
      margin-bottom: 1rem; font-size: .85rem; color: #fecaca;
      background: rgba(127,29,29,.3); border: 1px solid rgba(153,27,27,.5);
      border-radius: .5rem; padding: .65rem .75rem;
    }
    .muted { color: var(--ink-400); font-size: .85rem; }
    .hidden { display: none; }
    .spinner {
      width: 1rem; height: 1rem; border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>Render</h1>
  <p class="sub">Connect Luna to your Render.com account for deploy management, service control, and live logs.</p>

  <div id="error" class="err hidden"></div>

  <div id="loading" class="card muted">
    <span class="spinner" style="display:inline-block;vertical-align:middle"></span>
    <span style="vertical-align:middle">Loading…</span>
  </div>

  <!-- connected -->
  <div id="connected" class="card hidden">
    <div class="row">
      <span class="dot on"></span>
      <span style="font-weight:500">Connected</span>
      <span id="svc-count" class="muted"></span>
    </div>
    <button id="disconnect-btn" class="danger" data-testid="render-disconnect-btn">Disconnect</button>
  </div>

  <!-- disconnected -->
  <div id="disconnected" class="card hidden">
    <p class="muted" style="margin-top:0">
      Paste your Render API key to connect. Create one at
      <a href="https://dashboard.render.com/u/settings#api-keys" target="_blank" rel="noopener noreferrer">dashboard.render.com</a>.
    </p>
    <label>
      <span>API Key</span>
      <input id="api-key" type="password" placeholder="rnd_…" data-testid="render-api-key-input" />
    </label>
    <button id="connect-btn" class="primary" data-testid="render-connect-btn">Connect</button>
  </div>

  <script>
    const BASE = '/api/p/plugin-render';
    const token = new URLSearchParams(location.search).get('token');

    function authHeaders(extra) {
      const h = Object.assign({ 'Content-Type': 'application/json' }, extra || {});
      if (token) h['Authorization'] = 'Bearer ' + token;
      return h;
    }

    async function fetchJSON(url, init) {
      const resp = await fetch(url, Object.assign({}, init, { headers: authHeaders(init && init.headers) }));
      if (!resp.ok) { throw new Error((await resp.text()) || resp.statusText); }
      return resp.json();
    }

    const el = (id) => document.getElementById(id);
    function showError(msg) {
      const e = el('error');
      if (msg) { e.textContent = msg; e.classList.remove('hidden'); }
      else { e.classList.add('hidden'); }
    }
    function show(which) {
      for (const id of ['loading', 'connected', 'disconnected']) {
        el(id).classList.toggle('hidden', id !== which);
      }
    }

    async function refresh() {
      try {
        const s = await fetchJSON(BASE + '/status');
        showError(null);
        if (s.connected) {
          show('connected');
          el('svc-count').textContent = (s.service_count !== null && s.service_count !== undefined)
            ? '— ' + s.service_count + ' service' + (s.service_count !== 1 ? 's' : '') : '';
        } else {
          show('disconnected');
        }
      } catch (e) {
        showError(e.message);
        show('disconnected');
      }
    }

    function busy(btn, on, label) {
      btn.disabled = on;
      btn.innerHTML = on ? '<span class="spinner"></span>' + label : btn.dataset.label;
    }

    async function connect() {
      const key = el('api-key').value.trim();
      if (!key) return;
      const btn = el('connect-btn'); btn.dataset.label = 'Connect';
      busy(btn, true, 'Connecting…'); showError(null);
      try {
        await fetchJSON(BASE + '/connect', { method: 'POST', body: JSON.stringify({ api_key: key }) });
        el('api-key').value = '';
        await refresh();
      } catch (e) { showError(e.message); }
      finally { busy(btn, false, ''); }
    }

    async function disconnect() {
      const btn = el('disconnect-btn'); btn.dataset.label = 'Disconnect';
      busy(btn, true, 'Disconnecting…'); showError(null);
      try {
        await fetchJSON(BASE + '/disconnect', { method: 'POST' });
        await refresh();
      } catch (e) { showError(e.message); }
      finally { busy(btn, false, ''); }
    }

    el('connect-btn').addEventListener('click', connect);
    el('disconnect-btn').addEventListener('click', disconnect);
    el('api-key').addEventListener('keydown', (e) => { if (e.key === 'Enter') connect(); });
    refresh();
  </script>
</body>
</html>
